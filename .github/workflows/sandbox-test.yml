name: DHL Sandbox Test
on: { workflow_dispatch: {} }
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: dhl-sandbox-test } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node dhl-sandbox-test.js
        env:
          DHL_BASE: ${{ vars.DHL_SANDBOX_BASE || 'https://api-sandbox.dhl.com' }}
          DHL_CLIENT_ID: ${{ secrets.DHL_RETURNS_CLIENT_ID }}
          DHL_CLIENT_SECRET: ${{ secrets.DHL_RETURNS_CLIENT_SECRET }}
          DHL_USER: ${{ vars.DHL_SANDBOX_USER || 'user-valid' }}
          DHL_PASSWORD: ${{ secrets.DHL_SANDBOX_PASSWORD || '' }}
          RECEIVER_ID: deu
          LABEL_TYPE: SHIPMENT_LABEL
