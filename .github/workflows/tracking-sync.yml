name: DHL Tracking Sync
on:
  schedule:
    - cron: '30 5 * * *'
    - cron: '0 17 * * *' 
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: dhl-tracking-sync } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node index.js
        env:
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          DHL_API_KEY: ${{ secrets.DHL_TRACKING_API_KEY }}
          DHL_TRACKING_BASE: https://api-eu.dhl.com
          LOOKBACK_DAYS: '10'
          MAX_TRACK_CALLS: '2000'
          DRY_RUN: ${{ vars.TRACKING_DRY_RUN || 'true' }}
