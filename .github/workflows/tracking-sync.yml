name: DHL Tracking Sync
on:
  schedule:
    - cron: '30 5 * * *'        # morgens ~07:30 CEST
    - cron: '0 17 * * *'        # ~19:00 CEST, nach DHL-Abholung
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: dhl-tracking-sync } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node index.js
        env:
          SHOPIFY_STORES: ${{ secrets.SHOPIFY_STORES }}
          DHL_API_KEY: ${{ secrets.DHL_TRACKING_API_KEY }}
          DHL_TRACKING_BASE: https://api-eu.dhl.com
          LOOKBACK_DAYS: '10'
          MAX_TRACK_CALLS: '2000'         # global über alle Stores
          DRY_RUN: ${{ vars.TRACKING_DRY_RUN || 'true' }}
